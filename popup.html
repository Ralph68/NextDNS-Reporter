<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NextDNS Reporter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 290px; background: #0f172a; color: #fff;
  font-family: system-ui,-apple-system,sans-serif;
}
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.header-icon {
  width: 32px; height: 32px; background: #1a56db;
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex: none;
}
.header-title { font-size: 14px; font-weight: 600; }
.header-version { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }

.status-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex: none; }
.dot.ok   { background: #22c55e; }
.dot.warn { background: #f59e0b; }
.dot.off  { background: #ef4444; }
.status-label { font-size: 13px; font-weight: 500; }
.status-desc  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; line-height: 1.4; }

.section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.section-label {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3);
  letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px;
}
label { display: block; font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 4px; }
input[type=text], input[type=url] {
  width: 100%; padding: 7px 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; color: #fff; font-size: 12px; font-family: monospace;
  outline: none; transition: border-color 0.12s;
}
input:focus { border-color: rgba(255,255,255,0.3); }
input::placeholder { color: rgba(255,255,255,0.22); }
.hint { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 4px; }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-top: 10px;
}
.toggle-label { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.4; }
.toggle-desc  { font-size: 10px; color: rgba(255,255,255,0.3); }
.toggle {
  position: relative; flex: none;
  width: 36px; height: 20px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.12); border-radius: 10px;
  cursor: pointer; transition: background 0.2s;
}
.toggle-track::after {
  content: ""; position: absolute;
  left: 3px; top: 3px; width: 14px; height: 14px;
  background: #fff; border-radius: 50%; transition: transform 0.2s;
}
.toggle input:checked + .toggle-track { background: #1a56db; }
.toggle input:checked + .toggle-track::after { transform: translateX(16px); }

.save-btn {
  margin-top: 10px; width: 100%; padding: 8px;
  background: #1a56db; color: #fff; border: none;
  border-radius: 7px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.save-btn:hover { background: #1e40af; }
.save-confirm { font-size: 11px; text-align: center; margin-top: 5px; min-height: 14px; }

.footer {
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer a, .footer button {
  font-size: 11px; color: rgba(255,255,255,0.35);
  text-decoration: none; background: none; border: none;
  cursor: pointer; font-family: inherit; padding: 0;
  transition: color 0.12s;
}
.footer a:hover, .footer button:hover { color: rgba(255,255,255,0.75); }

#android-banner {
  display: none;
  margin: 12px 16px 0;
  background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
  border-radius: 8px; padding: 12px 14px;
}
#android-banner p {
  font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.6; margin-bottom: 10px;
}
#android-banner button {
  width: 100%; padding: 9px; background: rgba(245,158,11,0.2);
  border: 1px solid rgba(245,158,11,0.4); border-radius: 6px;
  color: #fcd34d; font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
#android-banner button:hover { background: rgba(245,158,11,0.32); }
</style>
</head>
<body>

<div id="android-banner">
  <p>Sur Firefox Android, accédez aux paramètres via :<br>
     <strong>Menu → Extensions → NextDNS Reporter → Paramètres</strong></p>
  <button id="open-options-btn">Ouvrir les paramètres</button>
</div>

<div class="header">
  <div class="header-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/>
    </svg>
  </div>
  <div>
    <div class="header-title">NextDNS Reporter</div>
    <div class="header-version" id="ext-version">v1.3.1</div>
  </div>
</div>

<div class="status-row">
  <div class="dot" id="status-dot"></div>
  <div>
    <div class="status-label" id="status-label">Chargement…</div>
    <div class="status-desc"  id="status-desc"></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Endpoint Formspree</div>
  <label for="ep-input">ID ou URL du formulaire</label>
  <input type="url" id="ep-input"
         placeholder="https://formspree.io/f/xxxxxxxx"
         spellcheck="false" autocomplete="off"/>
  <p class="hint">Créez un formulaire gratuit sur formspree.io</p>

  <div class="toggle-row" style="margin-top:12px">
    <div>
      <div class="toggle-label">Mode one-click</div>
      <div class="toggle-desc">Envoyer sans formulaire</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="oneclic-toggle"/>
      <span class="toggle-track"></span>
    </label>
  </div>

  <button class="save-btn" id="save-btn">Enregistrer</button>
  <div class="save-confirm" id="save-confirm"></div>
</div>

<div class="footer">
  <a href="#" id="options-link">Plus de paramètres →</a>
  <a href="https://formspree.io/dashboard" target="_blank">Formspree →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
